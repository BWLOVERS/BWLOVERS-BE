spring:
  application:
    name: bwlovers
  datasource:
    url: ${SUPABASE_URL}
    username: ${SUPABASE_USERNAME}
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
#  jackson:
#    serialization:
#      write-dates-as-timestamps: false
  profiles:
    active: local
  security:
    oauth2:
      client:
        registration:
          naver:
            client-id: ${CLIENT_ID}
            client-secret: ${CLIENT_SECRET}
            scope:
              - name
              - email
              - profile_image
              - mobile
            client-name: Naver
            authorization-grant-type: authorization_code
            redirect-uri: http://localhost:8080/auth/redirect/naver
            client-authentication-method: client_secret_post

        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

oauth2:
  redirect:
    success-url: "http://localhost:3000/auth/callback"
    failure-url: "http://localhost:3000/auth/callback"

jwt:
  secret: ${JWT_SECRET}
  access-token-expire-ms: 3600000
  refresh-token-expire-ms: 1209600000

ai:
  server:
    url: https://bwlovers-ai-822431995220.asia-northeast2.run.app #http://localhost:8000

analysis:
  ocr:
    job-ttl-seconds: 1800
    max-pages: 10
    max-file-size-bytes: 10485760

    s3:
      prefix: tmp/ocr

    clova:
      invoke-url: ${CLOVA_OCR_INVOKE_URL}
      secret: ${CLOVA_OCR_SECRET}

cloud:
  aws:
    region: ${AWS_REGION:ap-northeast-2}
    s3:
      bucket: ${OCR_TEMP_BUCKET}

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4.1-mini